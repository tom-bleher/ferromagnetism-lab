      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "1d0db38904205bec4d6f6f6a1f6cec3e", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "d3c7e3cacf313a0337ec1abf27022ac0", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"ferromagnetism\"\u003EFerromagnetism\u003C/h1\u003E\n\u003Ch3 id=\"part-a-magnetization-curve-of-the-iron-core\"\u003E\u003Cstrong\u003EPart A \u2014 Magnetization curve of the iron core\u003C/strong\u003E\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EPrimary AC current is swept; the scope dual-cursor readings\n\u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\Delta V_x,\\Delta V_y||)\u003C/marimo-tex\u003E span the \u003Cstrong\u003Efull peak-to-peak\u003C/strong\u003E of each axis\n(the positive to negative saturation distance on the hysteresis loop),\nso \u003Cmarimo-tex class=\"arithmatex\"\u003E||(V_\\text{peak} = \\Delta V/2||)\u003C/marimo-tex\u003E and\u003C/span\u003E\n\u003Cmarimo-tex class=\"arithmatex\"\u003E||[H = \\frac{N}{2\\,L\\,R_x}\\,\\Delta V_x, \\qquad B = \\frac{R_y\\,C}{2\\,N\\,A}\\,\\Delta V_y.||]\u003C/marimo-tex\u003E\u003Cspan class=\"paragraph\"\u003ECubic-spline fits give smooth \u003Cmarimo-tex class=\"arithmatex\"\u003E||(B(H)||)\u003C/marimo-tex\u003E and \u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\mu_r(H)=\\frac{B}{\\mu_0}H||)\u003C/marimo-tex\u003E.\u003C/span\u003E\n\u003Ch3 id=\"part-b-vacuum-permeability-mu_0\"\u003E\u003Cstrong\u003EPart B \u2014 Vacuum permeability \u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\mu_0||)\u003C/marimo-tex\u003E\u003C/strong\u003E\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003ECopper plates of total thickness \u003Cmarimo-tex class=\"arithmatex\"\u003E||(L'||)\u003C/marimo-tex\u003E are inserted with \u003Cmarimo-tex class=\"arithmatex\"\u003E||(B||)\u003C/marimo-tex\u003E held constant.\nAmp\u00e8re's law gives\u003C/
